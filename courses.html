<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كتالوج الدورات | CourseHub</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/coursehub-ui.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <script type="module" src="js/main.js" defer></script>
  <script type="module" src="js/catalog.js" defer></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="section container">
    <div class="section-head"><h1>كتالوج الدورات</h1><p>بحث سريع + فلاتر دقيقة + ترتيب واضح.</p></div>
    <div class="catalog-layout">
      <aside class="ch-card filter-box">
        <label>بحث<input id="search" class="ch-input" placeholder="ابحث عن دورة"></label><br><br>
        <label>التصنيف<select id="category" class="ch-select"><option value="all">الكل</option><option value="web">Web</option><option value="ai">AI</option><option value="data">Data</option></select></label><br><br>
        <label>المستوى<select id="level" class="ch-select"><option value="all">الكل</option><option value="مبتدئ">مبتدئ</option><option value="متوسط">متوسط</option></select></label><br><br>
        <label>السعر<select id="price" class="ch-select"><option value="all">الكل</option><option value="free">مجاني</option><option value="paid">مدفوع</option></select></label><br><br>
        <label>الترتيب<select id="sort" class="ch-select"><option value="top">الأعلى تقييماً</option><option value="latest">الأحدث</option></select></label>
      </aside>
      <section>
        <div class="catalog-grid" id="catalogGrid"></div>
        <div id="catalogEmpty" class="ch-card" style="padding:20px;display:none">لا توجد نتائج مطابقة. جرّب تغيير الفلاتر.</div>
        <button id="loadMore" class="ch-btn secondary" style="margin-top:14px">تحميل المزيد</button>
      </section>
    </div>
  </main>
  <div id="footer-placeholder"></div>
</body>
</html>
