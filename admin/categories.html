<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التصنيفات | لوحة التحكم</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <link rel="stylesheet" href="/css/footer.css" />
  <link rel="stylesheet" href="css-admin/admin.css" />
</head>
<body>
<div id="header-placeholder"></div>
<main class="admin-wrapper">
  <div class="admin-layout">
    <aside class="admin-sidebar"><div id="sidebar-placeholder"></div></aside>
    <section class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <h1>إدارة التصنيفات</h1>
        <p class="helper-text">تصنيفات حقيقية مرتبطة بالدورات (إضافة + تعديل + حذف + بحث).</p>

        <div class="table-toolbar">
          <div class="table-filters" style="flex:1; min-width:320px;">
            <input id="newCategoryName" type="text" placeholder="اسم التصنيف" />
            <input id="newCategoryDescription" type="text" placeholder="وصف مختصر (اختياري)" />
            <button id="addCategoryBtn" class="btn">إضافة تصنيف</button>
          </div>
          <div class="table-search">
            <input id="categoriesSearch" type="text" placeholder="ابحث في التصنيفات" />
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>التصنيف</th>
              <th>الوصف</th>
              <th>عدد الدورات</th>
              <th>آخر تعديل</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="categoriesRows"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
        </table>
      </div>
    </section>
  </div>
</main>
<div id="footer-placeholder"></div>
<script type="module" src="/js/main.js" defer></script>
<script type="module" src="/js/footer.js"></script>
<script type="module" src="js-admin/admin-guard.js"></script>
<script type="module" src="js-admin/admin-layout.js"></script>
<script type="module" src="js-admin/categories.js"></script>
</body>
</html>
